name: Hunter tools integration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract-and-config:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit tests
        run: python -m pytest tests/test_hunter_tools_manager.py -q
      - name: Static configuration checks
        run: python scripts/misc/verify_hunter_tools_integration.py --config-only
